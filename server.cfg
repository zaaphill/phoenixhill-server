# PhoenixHill server configuration
#
# host=localhost          -> start a server on THIS computer (default)
# host=1.2.3.4            -> connect to a remote server at that IP (uses port below)
# host=myapp.fly.dev      -> connect to a cloud server (auto HTTPS/WSS, no port needed)
#
# ── Local hosting (port forward) ──────────────────────────────────────────────
#   1. Keep host=localhost here
#   2. Forward port 8000 on your router to this computer
#   3. Give friends your PUBLIC IP and tell them to set host=<your IP>
#
# ── Cloud hosting (Fly.io) ────────────────────────────────────────────────────
#   After deploying to Fly.io, set:
#     host=your-app-name.fly.dev
#   Leave port=8000 (it's ignored for domain names — uses HTTPS/WSS on 443)

host=localhost
port=8000
